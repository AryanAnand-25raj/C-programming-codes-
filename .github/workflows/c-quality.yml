name: C quality checks

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.compiler }} build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check every source file
        run: make check CC=${{ matrix.compiler }}

      - name: Build every program
        run: make CC=${{ matrix.compiler }}
