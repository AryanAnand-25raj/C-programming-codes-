name: Bug report
description: Report incorrect output, a build failure, or another reproducible problem
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Problem
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include the program path, compiler, command, and input used.
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Compiler or program output
      render: shell
